name: Request Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_type:
        description: 'Deployment type'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - preview

jobs:
  request-deployment:
    name: Request Deployment from Vault
    runs-on: ubuntu-latest
    
    steps:
      - name: Request deployment from vault
        run: |
          echo "🚀 Requesting docs deployment from vault..."
          
          # Determine deployment type
          if [ "${{ github.event_name }}" == "push" ]; then
            DEPLOY_TYPE="production"
            REQUESTER="Auto (push to main)"
          else
            DEPLOY_TYPE="${{ inputs.deploy_type || 'production' }}"
            REQUESTER="${{ github.actor }} (manual)"
          fi
          
          echo "Deployment type: $DEPLOY_TYPE"
          echo "Requester: $REQUESTER"
          
          # Trigger deployment in vault repository
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/kroescontrol/kroescontrol-vault/dispatches \
            -f event_type="deploy-docs-$DEPLOY_TYPE" \
            -f 'client_payload[requester]="'"$REQUESTER"'"' \
            -f 'client_payload[triggered_from]="docs-repository"' \
            -f 'client_payload[deploy_type]="'"$DEPLOY_TYPE"'"' \
            -f 'client_payload[commit_sha]="${{ github.sha }}"' \
            -f 'client_payload[commit_message]="${{ github.event.head_commit.message || 'Manual deployment' }}"'
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          
      - name: View deployment info
        run: |
          echo "📊 Deployment request sent!"
          echo ""
          echo "The deployment will be handled by the vault repository."
          echo "This ensures all sensitive data injection happens in a secure environment."
          echo ""
          echo "Check deployment status at:"
          echo "https://github.com/kroescontrol/kroescontrol-vault/actions"