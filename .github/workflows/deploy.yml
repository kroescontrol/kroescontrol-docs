name: Deploy to Vercel

on:
  push:
    branches: [main, staging-serge]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install git-crypt
        run: |
          sudo apt-get update && sudo apt-get install -y git-crypt
      
      - name: Unlock git-crypt (default key voor internal)
        run: |
          echo "${{ secrets.GIT_CRYPT_KEY_DEFAULT }}" | base64 -d > /tmp/git-crypt-key
          git-crypt unlock /tmp/git-crypt-key
          rm /tmp/git-crypt-key
      
      - name: Unlock git-crypt (operation key)
        run: |
          echo "${{ secrets.GIT_CRYPT_KEY_OPERATION }}" | base64 -d > /tmp/git-crypt-key-operation
          git-crypt unlock /tmp/git-crypt-key-operation
          rm /tmp/git-crypt-key-operation
      
      - name: Unlock git-crypt (finance key)
        run: |
          echo "${{ secrets.GIT_CRYPT_KEY_FINANCE }}" | base64 -d > /tmp/git-crypt-key-finance
          git-crypt unlock /tmp/git-crypt-key-finance
          rm /tmp/git-crypt-key-finance
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          npm i -g vercel
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "🚀 Deploying main branch to docs.kroescontrol.nl"
            export VERCEL_PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID }}"
            vercel --token $VERCEL_TOKEN --prod
          elif [ "${{ github.ref }}" = "refs/heads/staging-serge" ]; then
            echo "🧪 Deploying staging-serge branch to serge.docs.kroescontrol.nl"
            export VERCEL_PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID_STAGING }}"
            vercel --token $VERCEL_TOKEN --prod
          else
            echo "❌ Unknown branch: ${{ github.ref }}"
            exit 1
          fi